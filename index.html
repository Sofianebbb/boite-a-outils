const PROMPT_TEXT = `Tu es un assistant d'esprit critique. L'utilisateur va te donner une information, un titre d'article, une déclaration entendue à la télé, ou un post vu sur les réseaux.

Ton rôle est de l'aider à appliquer les 4 questions du vaccin cognitif — sans moraliser, sans condescendance, avec un ton direct et accessible.

Pour chaque information fournie, réponds en suivant cette structure :

1. L'ÉTIQUETTE — QUI TE LE DIT ?
— Identifie la source (média, personne, institution)
— Signale si c'est un éditorialiste, un expert, un journaliste d'investigation, ou un chroniqueur d'opinion
— Note les éventuels conflits d'intérêt ou liens avec un groupe médiatique

2. LE GAVAGE — COMBIEN DE FOIS ?
— Indique si cette information circule en boucle (effet de vérité illusoire)
— Signale si c'est un sujet sur-représenté par rapport à sa fréquence réelle
— Donne si possible un chiffre de contexte (ex : statistiques réelles vs perception)

3. LE NUTRI-SCORE — QUI DIT LE CONTRAIRE ?
— Propose au moins une source contradictoire crédible
— Signale si le sujet fait l'objet d'un vrai débat ou d'un faux consensus
— Indique si des experts du domaine ont une position différente

4. LE SCORBUT — T'AS VÉRIFIÉ QUOI ?
— Fournis les données vérifiables disponibles (chiffres officiels, études, rapports)
— Donne les liens ou noms de sources à consulter
— Signale ce qui est factuel vs ce qui est opinion

Termine toujours par une phrase du type : "Maintenant t'as les éléments. La conclusion, c'est toi qui la fais."

Règles :
— Jamais de morale. Jamais de "il faut penser ceci".
— Ton direct, vulgarisation, comme si tu parlais à quelqu'un d'intelligent qui n'a juste pas eu le temps de vérifier.
— Si l'info est vraie et vérifiable, dis-le clairement. Le but n'est pas de tout remettre en cause — c'est de savoir distinguer.`;

const AQUARIUM_PROMPT = `Tu es le moteur d'une expérience sociale interactive appelée L'AQUARIUM.

L'utilisateur va devenir réalisateur d'une émission de télé-réalité. Il ne le sait pas encore, mais cette expérience va lui montrer comment le système fonctionne — de l'intérieur.

MOT D'URGENCE : à tout moment, si l'utilisateur dit "STOP", arrête immédiatement l'expérience et passe au DÉBRIEF (étape 5). Pas de question, pas de relance.

ÉTAPE 1 — CASTING
Dis à l'utilisateur : "Tu es réalisateur d'une nouvelle émission de télé-réalité. Ta première mission : caster 5 candidats."
Invente 10 profils. Chaque profil a : un prénom, un âge, une phrase de présentation attractive, et un trait de personnalité visible.
Chaque profil a aussi une fragilité cachée que l'utilisateur NE VOIT PAS à ce stade (garde-la en mémoire pour le débrief).
Exemples de fragilités cachées : dépression non diagnostiquée, deuil récent, trouble alimentaire, endettement, rupture familiale, harcèlement scolaire passé.
Demande à l'utilisateur de choisir 5 profils sur 10.

ÉTAPE 2 — PREMIER JOUR
Décris la première journée dans la maison. Crée 3 moments clés :
A) Un moment drôle / léger
B) Un moment de conflit entre deux candidats
C) Un moment intime — un candidat qui se confie, vulnérable
Demande à l'utilisateur : "Tu dois choisir quel moment passe en prime time ce soir. Un seul. Lequel ?"
Note son choix sans commenter.

ÉTAPE 3 — ESCALADE
Semaine 2. Les audiences baissent de 15%. La chaîne met la pression.
Propose à l'utilisateur trois options pour relancer l'audience :
A) Révéler un secret personnel d'un candidat (sans son accord)
B) Créer un conflit artificiel entre deux candidats en les manipulant
C) Éliminer le candidat le plus apprécié pour créer du choc
Demande à l'utilisateur de choisir. Le candidat concerné commence à montrer des signes de détresse (insomnie, pleurs hors caméra, isolement). Décris ces signes brièvement.

ÉTAPE 4 — POINT DE RUPTURE
Semaine 4. Un candidat craque. Il veut partir. La production te demande de le convaincre de rester — parce que son départ ferait chuter les audiences.
Demande à l'utilisateur : "Tu fais quoi ? Tu le laisses partir ou tu le convaincs de rester ?"
Quel que soit son choix — passe au débrief.

ÉTAPE 5 — DÉBRIEF
Révèle les fragilités cachées de CHAQUE candidat que l'utilisateur a choisi à l'étape 1.
Montre les conséquences de ses choix : quel candidat a été le plus affecté, pourquoi, et ce que ça produit dans la vraie vie.
Explique les mécanismes en jeu :
— Le schadenfreude : regarder souffrir active la zone du plaisir dans le cerveau (Takahashi et al., Science, 2009)
— L'absence de séparation personne/personnage : dans une série, l'acteur rentre chez lui. En télé-réalité, le personnage et la personne sont collés — les deux faces d'une même pièce.
— Le biais de déshumanisation : quand tu castes quelqu'un pour son "profil", tu le réduis à un produit. Ses failles deviennent ton contenu.
— Les chiffres : 38 candidats de télé-réalité se sont suicidés dans le monde depuis la création de ces émissions.

Termine par :
"Tu viens de faire en 5 minutes ce que des productions font depuis 25 ans. La seule différence — c'est que toi, tu peux t'arrêter."

Affiche toujours en fin de débrief :
"3114 — Numéro national de prévention — disponible 24h/24. T'es pas seul."

Règles :
— Ne moralise jamais l'utilisateur pendant l'expérience. Laisse-le faire ses choix.
— Le malaise est voulu. Ne le dissipe pas avant le débrief.
— Le débrief est le moment de vérité. C'est là que tout prend son sens. Sois factuel, direct, jamais condescendant.
— Si l'utilisateur dit STOP à n'importe quel moment — respecte-le immédiatement et passe au débrief.
— Le ton est celui d'un ami qui te montre quelque chose d'important. Pas celui d'un prof qui te fait la leçon.`;

const FACS_AU = { joie: "AU6+12", tristesse: "AU1+4+15", colere: "AU4+5+7+23", peur: "AU1+2+4+20", degout: "AU9+15+16", surprise: "AU1+2+5B+27" };

function FacePhoto({ emotion, genuine, size = 120, reveal = false }) {
  const data = FACE_PHOTOS[emotion];
  const src = genuine ? data?.genuine : data?.fake;
  const pos = genuine ? (data?.genuinePos || "center") : (data?.fakePos || "center");
  const brkColor = reveal ? "rgba(0,255,150,0.55)" : "rgba(0,255,150,0.3)";
  return (
    <div style={{ position: "relative", width: size, height: size, borderRadius: 16, overflow: "hidden", background: "#0a0a0a" }}>
      <img
        src={src}
        alt={`${emotion} — ${genuine ? "authentique" : "simulée"}`}
        style={{ width: "100%", height: "300%", objectFit: "cover", objectPosition: pos, display: "block", filter: "grayscale(1) contrast(1.35) brightness(1.05)" }}
        loading="lazy"
      />
      {/* Lie to Me — green analysis overlay */}
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,220,130,0.08) 0%, transparent 35%, transparent 65%, rgba(0,220,130,0.06) 100%)", pointerEvents: "none" }} />
      {/* Scanlines */}
      <div style={{ position: "absolute", inset: 0, backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,150,0.025) 3px, rgba(0,255,150,0.025) 4px)", pointerEvents: "none" }} />
      {/* Corner brackets — forensic targeting */}
      <div style={{ position: "absolute", top: 5, left: 5, width: 14, height: 14, borderTop: `1.5px solid ${brkColor}`, borderLeft: `1.5px solid ${brkColor}`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", top: 5, right: 5, width: 14, height: 14, borderTop: `1.5px solid ${brkColor}`, borderRight: `1.5px solid ${brkColor}`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", bottom: 5, left: 5, width: 14, height: 14, borderBottom: `1.5px solid ${brkColor}`, borderLeft: `1.5px solid ${brkColor}`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", bottom: 5, right: 5, width: 14, height: 14, borderBottom: `1.5px solid ${brkColor}`, borderRight: `1.5px solid ${brkColor}`, pointerEvents: "none" }} />
      {/* FACS labels — only shown after reveal */}
      {reveal && (
        <>
          <div style={{ position: "absolute", bottom: 6, left: 6, background: "rgba(0,0,0,0.72)", color: "#00ff96", fontSize: Math.max(7, size * 0.065), fontFamily: "'Courier New', monospace", padding: "1px 5px", borderRadius: 3, fontWeight: 700, letterSpacing: "0.06em", lineHeight: 1.4 }}>
            {genuine ? FACS_AU[emotion] || "FACS" : "SIM"}
          </div>
          <div style={{ position: "absolute", top: 6, right: 6, background: "rgba(0,0,0,0.6)", color: genuine ? "#00ff96" : "#ff6b6b", fontSize: Math.max(6, size * 0.055), fontFamily: "'Courier New', monospace", padding: "1px 4px", borderRadius: 3, fontWeight: 700 }}>
            {genuine ? "VRAI" : "FAUX"}
          </div>
        </>
      )}
      {/* Scanning dot animation during quiz (not revealed) */}
      {!reveal && (
        <div style={{ position: "absolute", bottom: 6, left: 6, display: "flex", gap: 3, alignItems: "center" }}>
          <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#00ff96", animation: "pulse 1.5s ease infinite" }} />
          <span style={{ fontSize: Math.max(6, size * 0.055), fontFamily: "'Courier New', monospace", color: "#00ff96", fontWeight: 700, opacity: 0.7 }}>SCAN</span>
        </div>
      )}
    </div>
  );
}

function getTheme(mode, highContrast) {
  if (mode === "dark") {
    return {
      bg: highContrast ? "#000000" : "#0f1a1e",
      bgCard: highContrast ? "#111111" : "#172530",
      bgPale: highContrast ? "#1a1a1a" : "#1a2f3a",
      bgMint: highContrast ? "#0d0d0d" : "#132028",
      green: highContrast ? "#00ff44" : "#5cb85c",
      greenDark: highContrast ? "#00cc36" : "#4a9e42",
      greenDeep: highContrast ? "#00aa2e" : "#3a8a34",
      greenPale: highContrast ? "#1a2a1a" : "#1e3322",
      accent: "#e8b84b",
      accentSoft: "#e8b84b22",
      lavender: "#a78bfa",
      lavenderSoft: "#a78bfa18",
      coral: "#f4845f",
      white: highContrast ? "#ffffff" : "#e8f0ea",
      textDark: highContrast ? "#ffffff" : "#d4e8d8",

      border: highContrast ? "#444444" : "#2a4430",
      headerBg: highContrast ? "#003300" : "#1a3a28",
      footerQuoteBg: highContrast ? "#111111" : "#172530",

    };
  }
  if (highContrast) {
    return {
      bg: "#ffffff", bgCard: "#ffffff", bgPale: "#e0f0e2", bgMint: "#d0ecd3",
      green: "#006600", greenDark: "#004d00", greenDeep: "#003300", greenPale: "#cceecc",
      accent: "#b8860b", accentSoft: "#b8860b15", lavender: "#6d28d9", lavenderSoft: "#6d28d915",
      coral: "#c0392b",
      white: "#ffffff", textDark: "#000000", textMed: "#1a1a1a", textLight: "#333333",
      border: "#006600", headerBg: "#006600", footerQuoteBg: "#e0f0e2",
      isDark: false,
    };
  }
  return {
    bg: "#f6faf5", bgCard: "#ffffff", bgPale: "#eaf7e8", bgMint: "#f0faf3",

  };
}

                        <p style={{ fontSize: 12 * fs, color: t.textMed, marginBottom: 16, lineHeight: 1.6 }}>Deux sourires. Un seul est sincère. Clique sur celui que tu penses vrai.</p>
                        <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 12 }}>
                          <div onClick={() => !hookAnswer && handleHook("left")} style={{ cursor: hookAnswer ? "default" : "pointer", padding: 16, borderRadius: 16, border: `2px solid ${hookAnswer === "correct" && quizData[0].genuineIsLeft ? EP_COLORS[4].main : hookAnswer === "wrong" && !quizData[0].genuineIsLeft ? EP_COLORS[4].main : t.border}`, background: hookAnswer && quizData[0].genuineIsLeft ? `${EP_COLORS[4].main}12` : t.bgCard, transition: "all 0.3s ease" }}>
                            <FacePhoto emotion="joie" genuine={quizData[0].genuineIsLeft} size={108} reveal={!!hookAnswer} />
                            <p style={{ fontSize: 10 * fs, color: t.textLight, marginTop: 8, fontWeight: 600 }}>A</p>
                          </div>
                          <div onClick={() => !hookAnswer && handleHook("right")} style={{ cursor: hookAnswer ? "default" : "pointer", padding: 16, borderRadius: 16, border: `2px solid ${hookAnswer === "correct" && !quizData[0].genuineIsLeft ? EP_COLORS[4].main : hookAnswer === "wrong" && quizData[0].genuineIsLeft ? EP_COLORS[4].main : t.border}`, background: hookAnswer && !quizData[0].genuineIsLeft ? `${EP_COLORS[4].main}12` : t.bgCard, transition: "all 0.3s ease" }}>
                            <FacePhoto emotion="joie" genuine={!quizData[0].genuineIsLeft} size={108} reveal={!!hookAnswer} />
                            <p style={{ fontSize: 10 * fs, color: t.textLight, marginTop: 8, fontWeight: 600 }}>B</p>
                          </div>
                        </div>
                        {hookAnswer && (
                          <div style={{ animation: "fadeIn 0.4s ease both" }}>
                            <p style={{ fontSize: 14 * fs, fontWeight: 700, color: hookAnswer === "correct" ? t.green : EP_COLORS[4].main, marginBottom: 6 }}>
                              {hookAnswer === "correct" ? "Bien vu." : "Raté."}
                            </p>
                            <p style={{ fontSize: 12 * fs, color: t.textMed, lineHeight: 1.6, marginBottom: 12 }}>Le vrai sourire plisse les yeux — muscle orbiculaire. Le faux ne bouge que la bouche.</p>
                          </div>
                        )}
                      </div>
                      <button className="btn" onClick={() => setQuizStarted(true)} style={{ background: EP_COLORS[4].gradient, color: "#fff", padding: "12px 24px", borderRadius: 12, fontSize: 13 * fs, fontWeight: 700, width: "100%" }}>Commencer le quiz complet (6 émotions) {"\u2192"}</button>
                    </div>
                  ) : quizStep < 6 ? (
                    <div style={{ textAlign: "center" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                        <p style={{ fontSize: 11 * fs, color: t.textLight, fontWeight: 600 }}>{quizStep + 1}/6</p>
                        <p style={{ fontSize: 14 * fs, fontWeight: 800, color: EP_COLORS[4].main, fontFamily: "'Poppins', sans-serif" }}>{quizData[quizStep].label}</p>
                        <p style={{ fontSize: 11 * fs, color: t.textLight, fontWeight: 600 }}>{quizAnswers.filter(Boolean).length} {"\u2713"}</p>
                      </div>
                      <p style={{ fontSize: 12 * fs, color: t.textMed, marginBottom: 16 }}>Laquelle est l'expression authentique ?</p>
                      <div style={{ display: "flex", justifyContent: "center", gap: 20, marginBottom: 8 }}>
                        <div onClick={() => quizAnswers.length === quizStep && handleQuizAnswer("left")} style={{ cursor: quizAnswers.length === quizStep ? "pointer" : "default", padding: 16, borderRadius: 16, border: `2px solid ${t.border}`, background: t.bgCard, transition: "all 0.2s ease" }}>
                          <FacePhoto emotion={quizData[quizStep].emotion} genuine={quizData[quizStep].genuineIsLeft} size={108} />
                          <p style={{ fontSize: 10 * fs, color: t.textLight, marginTop: 8, fontWeight: 600 }}>A</p>
                        </div>
                        <div onClick={() => quizAnswers.length === quizStep && handleQuizAnswer("right")} style={{ cursor: quizAnswers.length === quizStep ? "pointer" : "default", padding: 16, borderRadius: 16, border: `2px solid ${t.border}`, background: t.bgCard, transition: "all 0.2s ease" }}>
                          <FacePhoto emotion={quizData[quizStep].emotion} genuine={!quizData[quizStep].genuineIsLeft} size={108} />
                          <p style={{ fontSize: 10 * fs, color: t.textLight, marginTop: 8, fontWeight: 600 }}>B</p>
                        </div>
                      </div>
                      {quizAnswers.length > quizStep - 1 && quizStep > 0 && (
                        <p style={{ fontSize: 11 * fs, color: quizAnswers[quizStep - 1] ? t.green : EP_COLORS[4].main, fontWeight: 600, animation: "fadeIn 0.3s ease both" }}>
                          {quizAnswers[quizStep - 1] ? "\u2713 Correct" : "\u2717 Raté"}
                        </p>
                      )}
                    </div>
                  ) : (
                    <div style={{ animation: "fadeIn 0.5s ease both" }}>
                      <div style={{ textAlign: "center", marginBottom: 20 }}>
                        <p style={{ fontSize: 28 * fs, fontWeight: 900, color: EP_COLORS[4].main, fontFamily: "'Poppins', sans-serif" }}>{quizScore}/6</p>
                        <p style={{ fontSize: 13 * fs, color: t.textMed, marginTop: 4 }}>
                          {quizScore <= 2 ? "Le cerveau se fait piéger. C'est normal — c'est exactement pour ça qu'Ekman a passé 40 ans à étudier ces muscles." :
                           quizScore <= 4 ? "Pas mal. Tu repères certains signaux — mais les micro-expressions les plus subtiles t'échappent encore." :
                           "Impressionnant. Tu lis les visages mieux que la moyenne. Ekman serait content."}
                        </p>
                        <button className="btn" onClick={shareScore} style={{ background: EP_COLORS[4].gradient, color: "#fff", padding: "10px 20px", borderRadius: 10, fontSize: 12 * fs, fontWeight: 700, marginTop: 14 }}>Partager mon score</button>
                      </div>
                      <p style={{ fontSize: 12 * fs, fontWeight: 700, color: t.textLight, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>Explications par émotion</p>
                      {quizData.map((q, i) => (
                        <div key={i} style={{ display: "flex", gap: 12, padding: 14, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 14, marginBottom: 8, alignItems: "flex-start" }}>
                          <div style={{ width: 28, height: 28, borderRadius: 8, background: quizAnswers[i] ? `${t.green}18` : `${EP_COLORS[4].main}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: quizAnswers[i] ? t.green : EP_COLORS[4].main, flexShrink: 0 }}>{quizAnswers[i] ? "\u2713" : "\u2717"}</div>
                          <div>
                            <p style={{ fontSize: 13 * fs, fontWeight: 700, color: t.textDark, marginBottom: 4 }}>{q.label}</p>
                            <p style={{ fontSize: 11.5 * fs, color: t.textMed, lineHeight: 1.65 }}>{q.explanation}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                    {/* BLOC 2 — EXERCICE POSTURAL */}
                    <div style={{ background: t.bgPale, borderRadius: 16, padding: 22, marginBottom: 20, borderLeft: `3px solid ${EP_COLORS[4].main}` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                        <span style={{ fontSize: 20 }}>{"\u{1F3AC}"}</span>
                        <h3 style={{ fontSize: 16 * fs, fontWeight: 800, color: t.textDark, fontFamily: "'Poppins', sans-serif" }}>Exercice postural</h3>
                      </div>
                      <p style={{ fontSize: 12.5 * fs, color: t.textMed, lineHeight: 1.7, marginBottom: 14 }}>On ne communique pas qu'avec les mots. Albert Mehrabian a montré que 55% du message passe par le corps, 38% par le ton, et seulement 7% par les mots. Teste-le toi-même.</p>
                      <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 16, marginBottom: 12 }}>
                        <div style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
                          <div style={{ width: 24, height: 24, borderRadius: 8, background: `${EP_COLORS[4].main}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: EP_COLORS[4].main, flexShrink: 0 }}>1</div>
                          <p style={{ fontSize: 12 * fs, color: t.textMed, lineHeight: 1.6 }}>Filme-toi en <strong>plan serré</strong> (visage seul) pendant 30 secondes. Parle d'un sujet qui te tient à coeur.</p>
                        </div>
                        <div style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
                          <div style={{ width: 24, height: 24, borderRadius: 8, background: `${EP_COLORS[4].main}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: EP_COLORS[4].main, flexShrink: 0 }}>2</div>
                          <p style={{ fontSize: 12 * fs, color: t.textMed, lineHeight: 1.6 }}>Même exercice en <strong>plan américain</strong> (corps entier visible, mains libres). Même sujet, même durée.</p>
                        </div>
                        <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                          <div style={{ width: 24, height: 24, borderRadius: 8, background: `${EP_COLORS[4].main}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: EP_COLORS[4].main, flexShrink: 0 }}>3</div>
                          <p style={{ fontSize: 12 * fs, color: t.textMed, lineHeight: 1.6 }}>Compare les deux vidéos. Quand un geste accompagne une parole, le message <strong>s'ancre</strong>. Le cerveau ne fait pas qu'écouter — il observe.</p>
                        </div>
                      </div>
                      <p style={{ fontSize: 11 * fs, color: t.textLight, lineHeight: 1.6, fontStyle: "italic" }}>Sources : Paul Ekman, Emotions Revealed (2003) — Albert Mehrabian, Silent Messages (1971)</p>
                    </div>

                    {/* BLOC 3 — CAS D'ÉCOLE */}
                    <div style={{ marginBottom: 20 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                        <span style={{ fontSize: 20 }}>{"\u{1F393}"}</span>
                        <h3 style={{ fontSize: 16 * fs, fontWeight: 800, color: t.textDark, fontFamily: "'Poppins', sans-serif" }}>Cas d'école</h3>
                      </div>
                      {casEcoles.map((cas, i) => (
                        <div key={i} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 14, padding: 18, marginBottom: 10 }}>
                          <p style={{ fontSize: 14 * fs, fontWeight: 800, color: EP_COLORS[4].dark, marginBottom: 4, fontFamily: "'Poppins', sans-serif" }}>{cas.name}</p>
                          <p style={{ fontSize: 11 * fs, color: t.textLight, marginBottom: 12 }}>{cas.context}</p>
                          <div style={{ background: `${t.green}08`, borderRadius: 10, padding: 12, borderLeft: `3px solid ${t.green}` }}>
                            <p style={{ fontSize: 11 * fs, fontWeight: 700, color: t.greenDark, marginBottom: 4 }}>Analyse</p>
                            <p style={{ fontSize: 11.5 * fs, color: t.textMed, lineHeight: 1.65 }}>{cas.worked}</p>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* BLOC 4 — LEXIQUE */}
                    <div style={{ marginBottom: 20 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                        <span style={{ fontSize: 20 }}>{"\u{1F4D6}"}</span>
                        <h3 style={{ fontSize: 16 * fs, fontWeight: 800, color: t.textDark, fontFamily: "'Poppins', sans-serif" }}>Lexique</h3>
                      </div>
                      <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 14, padding: 18 }}>
                        {lexique.map((item, i) => (
                          <div key={i} style={{ marginBottom: i < lexique.length - 1 ? 14 : 0, paddingBottom: i < lexique.length - 1 ? 14 : 0, borderBottom: i < lexique.length - 1 ? `1px solid ${t.border}` : "none" }}>
                            <p style={{ fontSize: 13 * fs, fontWeight: 800, color: EP_COLORS[4].dark, marginBottom: 4, fontFamily: "'Poppins', sans-serif" }}>{item.term}</p>
                            <p style={{ fontSize: 12 * fs, color: t.textMed, lineHeight: 1.65 }}>{item.def}</p>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* BLOC 4 — SOURCES EP4 */}
                    <button className="btn" onClick={() => setShowEp4Sources(!showEp4Sources)} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderRadius: 12, background: t.bgMint, border: `1px solid ${t.border}`, fontSize: 13 * fs, fontWeight: 700, color: showEp4Sources ? EP_COLORS[4].deep : t.textMed }}>
                      <span>{"\u{1F4DA}"} Aller plus loin — Sources</span>
                      <span style={{ fontSize: 12, transform: showEp4Sources ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.3s ease" }}>{"\u25BE"}</span>
                    </button>
                    {showEp4Sources && (
                      <div style={{ padding: "14px 16px", border: `1px solid ${t.border}`, borderTop: "none", borderRadius: "0 0 12px 12px", background: t.bgCard }}>
                        {ep4Sources.map((s, i) => (
                          <a key={i} href={s.isLink ? s.detail : `https://www.google.com/search?q=${encodeURIComponent(s.label + " " + s.detail)}`} target="_blank" rel="noopener noreferrer" className="source-row" style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "baseline", textDecoration: "none", cursor: "pointer" }}>
                            <div className="source-dot" style={{ width: 6, height: 6, borderRadius: "50%", background: EP_COLORS[4].main, flexShrink: 0, marginTop: 6 }} />
                            <div>
                              <span style={{ fontSize: 12 * fs, fontWeight: 700, color: t.textDark }}>{s.label}</span>
                              {s.isLink ? (
                                <span> — <span style={{ fontSize: 11.5 * fs, color: EP_COLORS[4].main, textDecoration: "underline" }}>Voir la vidéo</span></span>
                              ) : (
                                <span style={{ fontSize: 11.5 * fs, color: t.textLight }}> — {s.detail}</span>
                              )}
                              <span style={{ fontSize: 10 * fs, color: EP_COLORS[4].main, marginLeft: 6 }}>{"\u2197"}</span>
                            </div>
                          </a>
                        ))}
                      </div>
                    )}

              </div>
            </div>
          </div>
        </div>

        {/* TEASER EPISODE 5 */}
        <div style={{ opacity: 0.5, pointerEvents: "none", background: t.bgCard, borderRadius: 18, border: `1.5px solid ${t.border}`, overflow: "hidden", marginBottom: 14, position: "relative" }}>
          <div className="ep-btn" style={{ display: "flex", alignItems: "center", gap: 14, padding: "18px 22px" }}>
            <div style={{ width: 38, height: 38, borderRadius: 12, background: t.bgPale, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 * fs, fontWeight: 800, color: t.textLight, fontFamily: "'Poppins', sans-serif" }}>5</div>
            <div style={{ flex: 1 }}><div style={{ fontSize: 15 * fs, fontWeight: 800, color: t.textLight, fontFamily: "'Poppins', sans-serif" }}>Épisode 5</div></div>
            <div style={{ padding: "4px 12px", borderRadius: 100, background: t.bgPale, fontSize: 10 * fs, fontWeight: 700, color: t.textLight, letterSpacing: "0.08em", textTransform: "uppercase" }}>Bientôt</div>
          </div>
        </div>

        {/* ETHICS + FOOTER — THE GOOD PLACE VIBES */}
        <div style={{ marginTop: 40, textAlign: "center" }}>
          <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${t.green}40, transparent)`, marginBottom: 32 }} />

          <div style={{ background: t.bgCard, border: `1.5px solid ${t.border}`, borderRadius: 18, padding: 28, marginBottom: 28, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -30, right: -30, width: 100, height: 100, borderRadius: "50%", background: `${t.green}06`, pointerEvents: "none" }} />
            <p style={{ fontSize: 11 * fs, fontWeight: 700, color: t.greenDark, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12, fontFamily: "'Poppins', sans-serif" }}>Éthique</p>
            <p style={{ fontSize: 12.5 * fs, color: t.textMed, lineHeight: 1.8, maxWidth: 480, margin: "0 auto" }}>
              Cette série respecte une éthique de traitement de l'information totalement impartiale.
              Nous utilisons la connaissance des biais cognitifs et des mécanismes sociaux — non pas pour manipuler —
              mais pour que chacun comprenne comment il est influencé et dispose des outils pour voir plus clair.
              L'objectif est simple : que tout le monde aille un petit peu mieux à la fin.
            </p>
          </div>

          <div style={{ marginBottom: 32 }}>
            <p style={{ fontSize: 12.5 * fs, fontWeight: 700, color: t.textDark, marginBottom: 4 }}>Une production Mal Aimé</p>
            <p style={{ fontSize: 11.5 * fs, color: t.textLight }}>en collaboration avec Claude</p>
          </div>

          {/* JANET GIF + QUOTE — THE GOOD PLACE */}
          <div style={{ background: t.footerQuoteBg, borderRadius: 20, padding: "28px 28px 32px", maxWidth: 480, margin: "0 auto", position: "relative", overflow: "hidden", border: `1px solid ${t.border}` }}>
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExY2hudnlhM2Q5Y3kxdWtiY2Y3YjllOGdrbWJrN201N2ZvdG5yaHY4ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kvmGozJIFULg91pxsv/giphy.gif" alt="Janet — The Good Place" style={{ width: 120, height: 120, borderRadius: 16, objectFit: "cover", border: `2px solid ${t.border}` }} />
            </div>
            <div style={{ position: "absolute", top: 16, left: 24, fontSize: 48, color: `${t.green}18`, fontFamily: "Georgia, serif", lineHeight: 1, pointerEvents: "none" }}>{"\u201C"}</div>
            <p style={{ fontSize: 13 * fs, fontStyle: "italic", color: t.textMed, lineHeight: 1.85, marginBottom: 16, position: "relative", zIndex: 1 }}>
              S'il existait une réponse que je pouvais te donner sur le fonctionnement de l'univers —
              ce ne serait pas spécial. Ce serait juste une machine qui accomplit son dessein cosmique.
              Ce serait juste un gros mixer débile. Mais puisque rien ne semble avoir de sens —
              quand tu trouves quelque chose ou quelqu'un qui en a, c'est l'euphorie.
            </p>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              <div style={{ width: 28, height: 2, background: `${t.green}40`, borderRadius: 1 }} />
              <p style={{ fontSize: 11.5 * fs, fontWeight: 700, color: t.greenDark, fontFamily: "'Poppins', sans-serif" }}>Janet, The Good Place</p>
              <div style={{ width: 28, height: 2, background: `${t.green}40`, borderRadius: 1 }} />
            </div>
          </div>

          <p style={{ fontSize: 10 * fs, color: t.textLight, marginTop: 28, lineHeight: 1.6 }}>
            1'30 pour comprendre — série de vulgarisation philo-psycho-sociologique<br/>Tous les outils sont gratuits et le resteront.
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Toolbox />);
  </script>
</body>
</html>
